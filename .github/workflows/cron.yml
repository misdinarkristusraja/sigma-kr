name: SIGMA — Cron Jobs

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 1 */3 * *'
  workflow_dispatch:

jobs:
  rekap-harian:
    name: Update Rekap Poin (19:00 WIB)
    runs-on: ubuntu-latest
    steps:
      - name: Panggil update_rekap_poin via REST API
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/update_rekap_poin" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "204" ]; then
            echo "✅ Rekap poin berhasil"
          else
            echo "❌ HTTP Error $HTTP_STATUS"
            exit 1
          fi
        env:
          SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  supabase-ping:
    name: Ping Supabase (Anti-Pause)
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/")
          echo "Ping status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "400" ]; then
            echo "✅ Supabase aktif"
          else
            echo "❌ Supabase tidak merespons: $HTTP_STATUS"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
