name: SIGMA — Cron Jobs

on:
  schedule:
    # Rekap poin setiap hari jam 19:00 WIB = 12:00 UTC
    - cron: '0 12 * * *'
    # Ping anti-pause Supabase setiap 3 hari jam 08:00 WIB = 01:00 UTC
    - cron: '0 1 */3 * *'
  # Bisa juga trigger manual dari GitHub Actions tab
  workflow_dispatch:

jobs:
  rekap-harian:
    name: Update Rekap Poin (19:00 WIB)
    runs-on: ubuntu-latest
    # Hanya jalankan saat scheduled (bukan dari PR)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Edge Function cron-rekap
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "$SUPABASE_URL/functions/v1/cron-rekap" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response code: $response"
          if [ "$response" != "200" ]; then
            echo "❌ cron-rekap failed with status $response"
            exit 1
          fi
          echo "✅ Rekap poin berhasil diupdate"
        env:
          SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  supabase-ping:
    name: Ping Supabase (Anti-Pause)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Ping Supabase project
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "$SUPABASE_URL/functions/v1/supabase-ping" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Ping response: $response"
          echo "✅ Supabase tetap aktif"
        env:
          SUPABASE_URL:              ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
